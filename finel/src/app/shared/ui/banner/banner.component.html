<section 
  [ngClass]="{
    'bg-[#16a34a] bg-gradient-to-r from-[#16a34a] to-[#119141]': theme === 'green',
    'bg-[#7c3aed] bg-gradient-to-r from-[#7c3aed] to-[#6d28d9]': theme === 'purple'
  }"
  class="relative overflow-hidden py-12 !text-white shadow-lg"
>

  <div class="absolute inset-0 bg-white/5 opacity-20 pointer-events-none"></div>
  <div class="absolute -right-20 -top-20 w-64 h-64 rounded-full blur-3xl opacity-30"
       [ngClass]="theme === 'green' ? 'bg-green-300' : 'bg-purple-300'"></div>

  <div class="max-w-7xl relative z-10 mx-auto px-4">

    <nav class="mb-4 flex items-center gap-2 text-sm font-semibold !text-white/90">
      @for (item of breadcrumbItems; track $index) {
        <span 
          (click)="navigateTo(item)"
          [class.cursor-pointer]="['Home', 'Categories', 'Brands', 'الرئيسية', 'الفئات', 'العلامات التجارية'].includes(item)"
          [class.hover:text-white]="['Home', 'Categories', 'Brands', 'الرئيسية', 'الفئات', 'العلامات التجارية'].includes(item)"
          class="transition-colors"
        >
          {{ item }}
        </span>
        @if (!$last) {
          <span class="text-white/40">/</span>
        }
      }
    </nav>

    <div class="flex flex-col md:flex-row items-center gap-6">

      <div 
        [ngClass]="{
          'bg-green-400/30': theme === 'green',
          'bg-purple-400/30': theme === 'purple'
        }"
        class="flex h-20 w-20 items-center justify-center rounded-2xl shadow-inner backdrop-blur-sm"
      >
        @if (icon === 'products') {
          <svg class="h-10 w-10 !text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
          </svg>
        } @else if (icon === 'categories') {
          <svg class="h-10 w-10 !text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
        } @else if (icon === 'brands') {
          <svg class="h-10 w-10 !text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
          </svg>
        }
      </div>

      <div class="text-center md:text-left">
        <h1 class="text-4xl font-extrabold tracking-tight md:text-5xl !text-white">
          {{ title }}
        </h1>
        <p class="mt-2 text-lg font-medium !text-white/90 max-w-2xl">
          {{ subtitle }}
        </p>
      </div>
    </div>
  </div>
</section>
