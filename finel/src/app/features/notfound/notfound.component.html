<section class="relative flex items-center justify-center min-h-screen p-6 overflow-hidden bg-gradient-to-br from-white to-emerald-50 dark:from-gray-950 dark:to-emerald-950/20 transition-colors duration-300">

  <div class="absolute top-[15%] left-[5%] text-5xl text-emerald-500 dark:text-emerald-400 opacity-10 dark:opacity-20 pointer-events-none animate-[float-around_20s_linear_infinite]">
    <i class="fa-solid fa-apple-whole"></i>
  </div>
  <div class="absolute top-[10%] right-[10%] text-4xl text-emerald-500 dark:text-emerald-400 opacity-10 dark:opacity-20 pointer-events-none animate-[float-around_20s_linear_infinite_-5s]">
    <i class="fa-solid fa-leaf"></i>
  </div>
  <div class="absolute bottom-[20%] left-[8%] text-4xl text-emerald-500 dark:text-emerald-400 opacity-10 dark:opacity-20 pointer-events-none animate-[float-around_20s_linear_infinite_-10s]">
    <i class="fa-solid fa-lemon"></i>
  </div>
  <div class="absolute bottom-[15%] right-[5%] text-5xl text-emerald-500 dark:text-emerald-400 opacity-10 dark:opacity-20 pointer-events-none animate-[float-around_20s_linear_infinite_-15s]">
    <i class="fa-solid fa-carrot"></i>
  </div>
  <div class="absolute top-[50%] right-[15%] text-3xl text-emerald-500 dark:text-emerald-400 opacity-10 dark:opacity-20 pointer-events-none animate-[float-around_20s_linear_infinite_-2s]">
    <i class="fa-solid fa-seedling"></i>
  </div>

  <div class="relative z-10 text-center max-w-2xl w-full">

    <div class="relative inline-block mb-10">
      <div class="w-36 h-36 bg-white dark:bg-gray-800 rounded-3xl shadow-2xl dark:shadow-emerald-900/20 flex items-center justify-center mx-auto animate-[floating_3s_ease-in-out_infinite] transition-colors duration-300">
        <i class="fa-solid fa-cart-shopping text-emerald-500 dark:text-emerald-400 text-6xl"></i>
      </div>
      <div class="absolute -top-4 -right-4 bg-emerald-500 dark:bg-emerald-600 text-white font-bold px-4 py-2 rounded-full shadow-lg border-4 border-white dark:border-gray-900 text-sm transition-colors duration-300">
        404
      </div>
      <div class="flex justify-center items-center gap-2 mt-4 opacity-50">
        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 dark:bg-emerald-400"></div>
        <div class="w-8 h-4 border-b-2 border-emerald-500 dark:border-emerald-400 rounded-full"></div>
        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 dark:bg-emerald-400"></div>
      </div>
    </div>

    <div class="mb-10">
      <h1 class="text-4xl md:text-5xl font-black text-slate-800 dark:text-white mb-4 transition-colors">{{ 'NOTFOUND.TITLE' | translate }}</h1>
      <p class="text-slate-500 dark:text-gray-400 text-lg md:text-xl leading-relaxed max-w-lg mx-auto transition-colors">
        {{ 'NOTFOUND.SUBTITLE' | translate }}
      </p>
    </div>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-16">
      <button
        routerLink="/home"
        class="flex items-center justify-center gap-2 w-full sm:w-auto bg-emerald-500 hover:bg-emerald-600 dark:bg-emerald-600 dark:hover:bg-emerald-700 text-white font-bold px-8 py-3.5 rounded-2xl shadow-lg shadow-emerald-200 dark:shadow-none hover:-translate-y-0.5 transition-all duration-300 cursor-pointer"
      >
        <i class="fa-solid fa-house"></i>
        {{ 'NOTFOUND.GO_HOME' | translate }}
      </button>
      <button
        onclick="history.back()"
        class="flex items-center justify-center gap-2 w-full sm:w-auto bg-white dark:bg-gray-800 hover:bg-emerald-50 dark:hover:bg-gray-700 text-slate-700 dark:text-gray-300 hover:text-emerald-600 dark:hover:text-emerald-400 font-bold px-8 py-3.5 rounded-2xl border-2 border-slate-200 dark:border-gray-700 hover:border-emerald-400 dark:hover:border-emerald-500 hover:-translate-y-0.5 transition-all duration-300 cursor-pointer"
      >
        <i class="fa-solid fa-arrow-left"></i>
        {{ 'NOTFOUND.GO_BACK' | translate }}
      </button>
    </div>

    <div class="p-8 rounded-3xl bg-white/60 dark:bg-gray-800/60 backdrop-blur-sm border border-white/60 dark:border-gray-700/60 shadow-sm transition-colors duration-300">
      <h3 class="text-xs font-bold text-slate-400 dark:text-gray-500 uppercase tracking-widest mb-6">{{ 'NOTFOUND.POPULAR' | translate }}</h3>
      <div class="flex flex-wrap justify-center gap-3">
        <a routerLink="/shop"
          class="px-5 py-2 rounded-xl bg-emerald-50 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-800/50 text-sm font-semibold hover:bg-emerald-100 dark:hover:bg-emerald-800 transition-colors no-underline">
          {{ 'NOTFOUND.ALL_PRODUCTS' | translate }}
        </a>
        <a routerLink="/categories"
          class="px-5 py-2 rounded-xl bg-white dark:bg-gray-800 text-slate-500 dark:text-gray-300 border border-slate-100 dark:border-gray-700 text-sm font-semibold hover:bg-emerald-50 dark:hover:bg-gray-700 hover:text-emerald-600 dark:hover:text-emerald-400 hover:border-emerald-200 dark:hover:border-emerald-600 transition-colors no-underline">
          {{ 'NOTFOUND.CATEGORIES' | translate }}
        </a>
        <a routerLink="/not-found"
          class="px-5 py-2 rounded-xl bg-white dark:bg-gray-800 text-slate-500 dark:text-gray-300 border border-slate-100 dark:border-gray-700 text-sm font-semibold hover:bg-emerald-50 dark:hover:bg-gray-700 hover:text-emerald-600 dark:hover:text-emerald-400 hover:border-emerald-200 dark:hover:border-emerald-600 transition-colors no-underline">
          {{ 'NOTFOUND.TODAYS_DEALS' | translate }}
        </a>
        <a routerLink="/support"
          class="px-5 py-2 rounded-xl bg-white dark:bg-gray-800 text-slate-500 dark:text-gray-300 border border-slate-100 dark:border-gray-700 text-sm font-semibold hover:bg-emerald-50 dark:hover:bg-gray-700 hover:text-emerald-600 dark:hover:text-emerald-400 hover:border-emerald-200 dark:hover:border-emerald-600 transition-colors no-underline">
          {{ 'NOTFOUND.CONTACT_US' | translate }}
        </a>
      </div>
    </div>

  </div>
</section>
