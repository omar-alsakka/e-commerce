<section>
  <div class="max-w-6xl py-10 mx-auto">

    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-bold text-gray-900 flex items-center gap-3">
          <span
            class="bg-brand-700 text-white w-9 h-9 flex items-center justify-center rounded-md text-lg"
          >
            <i class="fa-solid fa-receipt"></i>
          </span>
          {{ 'CHECKOUT.TITLE' | translate }}
        </h1>
        <p class="text-gray-500 mt-1">{{ 'CHECKOUT.SUBTITLE' | translate }}</p>
      </div>
      <a
        routerLink="/cart"
        class="text-brand-600 hover:text-brand-800 font-medium flex items-center gap-2 transition-colors"
      >
        <i class="fa-solid fa-arrow-left-long"></i>
        {{ 'CHECKOUT.BACK_TO_CART' | translate }}
      </a>
    </div>

    <div class="space-y-6">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-6">
          <form [formGroup]="checkOut" (ngSubmit)="submitForm()" class="space-y-5">
            <div formGroupName="shippingAddress">

              <div>
                <label for="city" class="block mb-2 text-sm font-medium text-gray-900"
                  >{{ 'CHECKOUT.CITY_LABEL' | translate }} <span class="text-red-500">{{ 'CHECKOUT.REQUIRED' | translate }}</span></label
                >
                <div class="relative">
                  <div
                    class="absolute inset-y-0 inset-s-0 flex items-center ps-3.5 pointer-events-none text-gray-400"
                  >
                    <i class="fa-solid fa-city"></i>
                  </div>
                  <input
                    formControlName="city"
                    type="text"
                    id="city"
                    class="bg-white border text-gray-900 text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block w-full ps-10 p-3"
                    [class.border-red-500]="city?.invalid && (city?.touched || submitted())"
                    [class.border-gray-300]="!(city?.invalid && (city?.touched || submitted()))"
                    [placeholder]="'CHECKOUT.CITY_PLACEHOLDER' | translate"
                    required
                  />
                </div>
                <p
                  *ngIf="city?.invalid && (city?.touched || submitted())"
                  class="mt-1 text-sm text-red-600"
                >
                  <span *ngIf="city?.errors?.['required']">{{ 'CHECKOUT.CITY_REQUIRED' | translate }}</span>
                </p>
              </div>

              <div>
                <label for="address" class="block mb-2 text-sm font-medium text-gray-900"
                  >{{ 'CHECKOUT.ADDRESS_LABEL' | translate }} <span class="text-red-500">{{ 'CHECKOUT.REQUIRED' | translate }}</span></label
                >
                <div class="relative">
                  <div
                    class="absolute inset-y-0 inset-s-0 flex items-start pt-3.5 ps-3.5 pointer-events-none text-gray-400"
                  >
                    <i class="fa-solid fa-location-dot"></i>
                  </div>
                  <textarea
                    formControlName="address"
                    id="address"
                    rows="3"
                    class="bg-white border text-gray-900 text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block w-full ps-10 p-3"
                    [class.border-red-500]="address?.invalid && (address?.touched || submitted())"
                    [class.border-gray-300]="
                      !(address?.invalid && (address?.touched || submitted()))
                    "
                    [placeholder]="'CHECKOUT.ADDRESS_PLACEHOLDER' | translate"
                    required
                  ></textarea>
                </div>
                <p
                  *ngIf="address?.invalid && (address?.touched || submitted())"
                  class="mt-1 text-sm text-red-600"
                >
                  <span *ngIf="address?.errors?.['required']">{{ 'CHECKOUT.ADDRESS_REQUIRED' | translate }}</span>
                </p>
              </div>

              <div>
                <label for="phone" class="block mb-2 text-sm font-medium text-gray-900"
                  >{{ 'CHECKOUT.PHONE_LABEL' | translate }} <span class="text-red-500">{{ 'CHECKOUT.REQUIRED' | translate }}</span></label
                >
                <div class="relative">
                  <div
                    class="absolute inset-y-0 inset-s-0 flex items-center ps-3.5 pointer-events-none text-gray-400"
                  >
                    <i class="fa-solid fa-phone"></i>
                  </div>
                  <input
                    formControlName="phone"
                    type="tel"
                    id="phone"
                    class="bg-white border text-gray-900 text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block w-full ps-10 p-3"
                    [class.border-red-500]="phone?.invalid && (phone?.touched || submitted())"
                    [class.border-gray-300]="!(phone?.invalid && (phone?.touched || submitted()))"
                    [placeholder]="'CHECKOUT.PHONE_PLACEHOLDER' | translate"
                    required
                  />
                  <div
                    class="absolute inset-y-0 inset-e-0 flex items-center pe-3 pointer-events-none"
                  >
                    <span class="text-xs text-gray-400">{{ 'CHECKOUT.PHONE_HINT' | translate }}</span>
                  </div>
                </div>
                <p
                  *ngIf="phone?.invalid && (phone?.touched || submitted())"
                  class="mt-1 text-sm text-red-600"
                >
                  <span *ngIf="phone?.errors?.['required']">{{ 'CHECKOUT.PHONE_REQUIRED' | translate }}</span>
                </p>
              </div>

              <div class="group grid pt-3 md:grid-cols-3 gap-8">
                <div class="md:col-span-2 space-y-6">
                  <div class="space-y-4">
                    <label for="payment-cod" class="block relative">
                      <input
                        #ref1
                        type="radio"
                        id="payment-cod"
                        name="payment_method"
                        value="cash"
                        class="peer sr-only"
                        checked
                        (change)="changeFlag(ref1)"
                      />

                      <div
                        class="p-5 bg-white border-2 border-gray-200 rounded-2xl cursor-pointer transition-all duration-200 ease-in-out peer-checked:border-green-500 peer-checked:bg-green-50/50 hover:border-green-300"
                      >
                        <div class="flex items-center justify-between gap-4">
                          <div class="flex items-center gap-4 grow">
                            <div
                              class="w-14 h-14 bg-green-500 text-white rounded-xl flex items-center justify-center transition-colors peer-checked:bg-green-500"
                            >
                              <i class="fas fa-money-bill-wave text-xl"></i>
                            </div>
                            <div>
                              <h3 class="font-bold text-lg text-green-800">{{ 'CHECKOUT.CASH_TITLE' | translate }}</h3>
                              <p class="text-sm text-gray-500">
                                {{ 'CHECKOUT.CASH_DESC' | translate }}
                              </p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </label>

                    <label for="payment-card" class="block relative">
                      <input
                        #ref2
                        type="radio"
                        id="payment-card"
                        name="payment_method"
                        value="visa"
                        class="peer sr-only"
                        (change)="changeFlag(ref2)"
                      />

                      <div
                        class="p-5 bg-white border-2 border-gray-200 rounded-2xl cursor-pointer transition-all duration-200 ease-in-out peer-checked:border-green-500 peer-checked:bg-green-50/50 hover:border-green-300"
                      >
                        <div class="flex items-center justify-between gap-4">
                          <div class="flex items-center gap-4 grow">
                            <div
                              class="w-14 h-14 bg-gray-100 text-gray-400 rounded-xl flex items-center justify-center transition-colors peer-checked:bg-blue-500 peer-checked:text-white"
                            >
                              <i class="fas fa-credit-card text-xl"></i>
                            </div>
                            <div>
                              <h3 class="font-bold text-lg text-gray-900">{{ 'CHECKOUT.ONLINE_TITLE' | translate }}</h3>
                              <p class="text-sm text-gray-500">
                                {{ 'CHECKOUT.ONLINE_DESC' | translate }}
                              </p>
                              <div class="flex items-center gap-2 mt-1">
                                <i class="fab fa-cc-visa text-2xl text-blue-800"></i>
                                <i class="fab fa-cc-mastercard text-2xl text-orange-600"></i>
                                <i class="fab fa-cc-amex text-2xl text-blue-500"></i>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </label>
                  </div>
                </div>

                <div
                  class="md:col-span-1 p-6 bg-white border border-gray-100 rounded-2xl shadow-sm h-fit sticky top-8 space-y-5"
                >
                  <div class="pt-2">
                    <button
                      type="submit"
                      class="w-full py-3.5 px-4 rounded-lg bg-green-600 text-white font-semibold text-sm items-center justify-center gap-2 hover:bg-green-700 transition-colors hidden group-has-[#payment-cod:checked]:inline-flex"
                    >
                      <i class="fas fa-shopping-bag"></i>
                      {{ 'CHECKOUT.PLACE_ORDER' | translate }}
                    </button>

                    <button
                      type="submit"
                      class="w-full py-3.5 px-4 rounded-lg bg-green-600 text-white font-semibold text-sm items-center justify-center gap-2 hover:bg-green-700 transition-colors hidden group-has-[#payment-card:checked]:inline-flex"
                    >
                      <i class="fas fa-shield-alt"></i>
                      {{ 'CHECKOUT.PROCEED_PAYMENT' | translate }}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
