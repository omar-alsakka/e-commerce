<app-banner 
  [title]="'BRANDS.TOP_BRANDS' | translate" 
  [subtitle]="'BRANDS.SHOP_FAV' | translate" 
  [breadcrumb]="'BRANDS.BREADCRUMB' | translate" 
  icon="brands" 
  theme="purple"
></app-banner>

<div class="max-w-7xl mx-auto my-12 px-4">

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-6">
    @for (brand of brandsList(); track brand._id) {
      <div
        [routerLink]="['/brand-products', brand._id]"
        class="group bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-700/50 rounded-2xl shadow-sm hover:shadow-2xl hover:border-emerald-500 dark:hover:border-emerald-500 transition-all duration-500 cursor-pointer overflow-hidden flex flex-col items-center"
      >

        <div class="p-6 h-52 flex items-center justify-center w-full bg-white dark:bg-slate-800">
          <img
            [src]="brand.image"
            [alt]="brand.name"
            class="max-w-full max-h-full object-contain transform group-hover:scale-110 transition-transform duration-500 transition-all mix-blend-multiply dark:mix-blend-normal brightness-100 dark:brightness-90"
          >
        </div>

        <div class="w-full p-4 border-t border-gray-50 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 group-hover:bg-white dark:group-hover:bg-slate-800 transition-colors text-center">
          <h3 class="text-xl font-extrabold text-gray-700 dark:text-slate-200 group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors">
            {{ brand.name }}
          </h3>
          <p class="text-sm text-gray-400 dark:text-gray-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
            {{ 'BRANDS.VIEW_COLLECTION' | translate }} {{ brand.name }} {{ 'BRANDS.COLLECTION_WORD' | translate }}
          </p>
        </div>

      </div>
    }
  </div>
</div>
